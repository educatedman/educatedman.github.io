
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
nav{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:0.5px solid var(--color-border-tertiary);position:sticky;top:0;background:var(--color-background-primary);z-index:100}
nav img{width:36px;height:36px;border-radius:8px;object-fit:cover}
nav h1{font-size:18px;font-weight:500;color:var(--color-text-primary)}
nav .search-wrap{flex:1;display:flex;align-items:center;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;padding:6px 14px;gap:8px;max-width:400px;margin-left:auto}
nav .search-wrap input{border:none;background:transparent;outline:none;font-size:14px;color:var(--color-text-primary);width:100%}
nav .search-wrap input::placeholder{color:var(--color-text-tertiary)}
nav .search-icon{font-size:13px;color:var(--color-text-tertiary)}

.hero{padding:20px;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto;gap:12px}
.hero-card{position:relative;border-radius:16px;overflow:hidden;cursor:pointer;border:0.5px solid var(--color-border-tertiary)}
.hero-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.3s}
.hero-card:hover img{transform:scale(1.04)}
.hero-card .overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 60%);display:flex;flex-direction:column;justify-content:flex-end;padding:14px}
.hero-card .game-title{color:#fff;font-size:13px;font-weight:500}
.hero-card .play-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.2);border:0.5px solid rgba(255,255,255,0.4);border-radius:20px;padding:4px 10px;color:#fff;font-size:11px;margin-top:5px;backdrop-filter:blur(4px)}
.hero-card.big{grid-row:1/3;grid-column:1/2;height:320px}
.hero-card.med{height:154px}
.hero-card.med2{height:154px}
.hero-card.tall{grid-row:1/3;height:320px}
.hot-badge{position:absolute;top:10px;left:10px;background:#E24B4A;color:#fff;font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px}
.new-badge{position:absolute;top:10px;left:10px;background:#1D9E75;color:#fff;font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px}

.section{padding:0 20px 20px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.section-header h2{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.section-header .pill{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--color-text-secondary)}
.category-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.category-row::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:13px;color:var(--color-text-secondary);cursor:pointer;transition:all 0.15s;font-family:var(--font-sans)}
.cat-btn.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.cat-btn:hover:not(.active){background:var(--color-background-secondary)}

.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
.game-tile{border-radius:12px;overflow:hidden;position:relative;cursor:pointer;border:0.5px solid var(--color-border-tertiary);aspect-ratio:1;background:var(--color-background-secondary)}
.game-tile img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.25s}
.game-tile:hover img{transform:scale(1.08)}
.game-tile .tile-name{position:absolute;bottom:0;left:0;right:0;padding:5px 7px;background:rgba(0,0,0,0.6);color:#fff;font-size:10px;font-weight:500;opacity:0;transition:opacity 0.2s}
.game-tile:hover .tile-name{opacity:1}

.featured-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.featured-row::-webkit-scrollbar{display:none}
.feat-card{flex-shrink:0;width:160px;border-radius:14px;overflow:hidden;position:relative;cursor:pointer;border:0.5px solid var(--color-border-tertiary);height:200px;background:var(--color-background-secondary)}
.feat-card img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s}
.feat-card:hover img{transform:scale(1.05)}
.feat-card .overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,transparent 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
.feat-card .game-title{color:#fff;font-size:12px;font-weight:500}

.streak-bar{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:14px;padding:14px 16px;margin:0 20px 20px;display:flex;align-items:center;gap:14px}
.streak-icon{font-size:22px}
.streak-text h3{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.streak-text p{font-size:12px;color:var(--color-text-secondary)}
.streak-dots{display:flex;gap:5px;margin-left:auto}
.dot{width:10px;height:10px;border-radius:50%;background:var(--color-border-tertiary)}
.dot.filled{background:#E24B4A}

.hidden{display:none}
.all-section{display:block}
</style>

let activeCat = 'all';

function renderGrid(list, container){
  container.innerHTML = list.map(g=>`
    <div class="game-tile" onclick="location.href='${g.href}'">
      <img src="${g.img}" alt="${g.name}" loading="lazy">
      <div class="tile-name">${g.name}</div>
    </div>
  `).join('');
}

function openGame(href){ location.href = href; }

function filterGames(){
  const filtered = activeCat === 'all' ? games : games.filter(g=>g.cat===activeCat);
  renderGrid(filtered, document.getElementById('gameGrid'));
}

document.getElementById('catRow').addEventListener('click', e=>{
  const btn = e.target.closest('.cat-btn');
  if(!btn) return;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  filterGames();
});

const searchInput = document.getElementById('searchInput');
const mainContent = document.getElementById('mainContent');
const searchResults = document.getElementById('searchResults');
const searchGrid = document.getElementById('searchGrid');
const searchTitle = document.getElementById('searchResultsTitle');

searchInput.addEventListener('input', ()=>{
  const q = searchInput.value.trim().toLowerCase();
  if(!q){
    mainContent.classList.remove('hidden');
    searchResults.classList.add('hidden');
    return;
  }
  mainContent.classList.add('hidden');
  searchResults.classList.remove('hidden');
  const hits = games.filter(g=>g.name.toLowerCase().includes(q));
  searchTitle.textContent = hits.length ? `${hits.length} result${hits.length!==1?'s':''} for "${searchInput.value}"` : `No results for "${searchInput.value}"`;
  renderGrid(hits, searchGrid);
});

filterGames();
